name: CI

on:
  push:
    branches: [main, "sprint*/**"]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  PORT: ${{ vars.PORT }}

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Format check
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "Files not formatted:"
            echo "$output"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: ./server

      - name: Test
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Coverage report
        run: go tool cover -func=coverage.out

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: gah
          POSTGRES_PASSWORD: gah
          POSTGRES_DB: gah
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gah -d gah"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: gah
          RABBITMQ_DEFAULT_PASS: gah
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://gah:gah@localhost:5432/gah?sslmode=disable
      TEST_REDIS_ADDR: localhost:6379
      TEST_RABBITMQ_URL: amqp://gah:gah@localhost:5672/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Integration tests
        run: go test -tags=integration -count=1 ./...
