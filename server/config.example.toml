[server]
port = 8080
read_timeout = "15s"
write_timeout = "15s"
idle_timeout = "60s"

[database]
url = "postgres://localhost:5432/gah?sslmode=disable"
max_open_conns = 25
max_idle_conns = 10
conn_max_lifetime = "5m"

[auth]
# Segredo usado para assinar tokens JWT (HS256). Sobrescreva via AUTH_JWT_SECRET.
jwt_secret = "change-me-in-production"
# Tempo de validade do token de acesso. Sobrescreva via AUTH_TOKEN_TTL.
token_ttl = "24h"
# Pepper aplicado ao hash Argon2id da senha. Sobrescreva via AUTH_PASSWORD_PEPPER.
password_pepper = ""

[messaging]
# Connection string AMQP do RabbitMQ. Sobrescreva via RABBITMQ_URL.
url = "amqp://gah:gah@localhost:5672/"
# Topic exchange onde os eventos são publicados. Sobrescreva via RABBITMQ_EXCHANGE.
exchange = "gah.events"
# Prefixo das filas declaradas pelos consumidores. Sobrescreva via RABBITMQ_QUEUE_PREFIX.
queue_prefix = "gah"
# Limite de mensagens não confirmadas por consumidor (QoS). Sobrescreva via RABBITMQ_PREFETCH.
prefetch = 10

[redis]
# Endereço host:porta do Redis (cache de leitura de métricas). Sobrescreva via REDIS_ADDR.
addr = "localhost:6379"
# Senha do Redis (vazio = sem auth). Sobrescreva via REDIS_PASSWORD.
password = ""
# Índice do banco lógico do Redis. Sobrescreva via REDIS_DB.
db = 0
# TTL das entradas de cache do caminho de leitura de métricas. Sobrescreva via REDIS_METRICS_TTL.
metrics_ttl = "5m"

[connectors.strava]
# Credenciais da aplicação Strava (https://www.strava.com/settings/api).
# Sobrescreva via STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET.
client_id = ""
client_secret = ""
# URL de callback OAuth registrada na Strava. Sobrescreva via STRAVA_REDIRECT_URL.
redirect_url = "http://localhost:8080/api/v1/connectors/strava/callback"
# Token de verificação da subscription do webhook. Sobrescreva via STRAVA_WEBHOOK_VERIFY_TOKEN.
webhook_verify_token = "change-me-webhook-token"
# Endpoints sobrescritíveis (vazio = padrões reais da Strava). Úteis em testes.
# auth_url = "https://www.strava.com/oauth/authorize"
# token_url = "https://www.strava.com/oauth/token"
# api_base_url = "https://www.strava.com"

[notifications]
# Provedor de push: "fcm" (FCM HTTP v1) ou "log". Sobrescreva via NOTIFICATIONS_PROVIDER.
# Se fcm_credentials_file ou fcm_project_id estiverem vazios, a wiring usa o
# LogNotifier (stub seguro, sem rede).
provider = "log"
# Endpoint base do FCM (vazio = endpoint real). Sobrescreva via FCM_BASE_URL.
fcm_base_url = ""
# Caminho do JSON da service-account do Firebase. Sobrescreva via FCM_CREDENTIALS_FILE.
fcm_credentials_file = ""
# ID do projeto Firebase/GCP. Sobrescreva via FCM_PROJECT_ID.
fcm_project_id = ""
