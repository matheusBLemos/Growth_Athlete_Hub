[server]
port = 8080
read_timeout = "15s"
write_timeout = "15s"
idle_timeout = "60s"

[database]
url = "postgres://localhost:5432/gah?sslmode=disable"
max_open_conns = 25
max_idle_conns = 10
conn_max_lifetime = "5m"

[auth]
# Segredo usado para assinar tokens JWT (HS256). Sobrescreva via AUTH_JWT_SECRET.
jwt_secret = "change-me-in-production"
# Tempo de validade do token de acesso. Sobrescreva via AUTH_TOKEN_TTL.
token_ttl = "24h"
# Pepper aplicado ao hash Argon2id da senha. Sobrescreva via AUTH_PASSWORD_PEPPER.
password_pepper = ""

[messaging]
# Connection string AMQP do RabbitMQ. Sobrescreva via RABBITMQ_URL.
url = "amqp://gah:gah@localhost:5672/"
# Topic exchange onde os eventos são publicados. Sobrescreva via RABBITMQ_EXCHANGE.
exchange = "gah.events"
# Prefixo das filas declaradas pelos consumidores. Sobrescreva via RABBITMQ_QUEUE_PREFIX.
queue_prefix = "gah"
# Limite de mensagens não confirmadas por consumidor (QoS). Sobrescreva via RABBITMQ_PREFETCH.
prefetch = 10

[redis]
# Endereço host:porta do Redis (cache de leitura de métricas). Sobrescreva via REDIS_ADDR.
addr = "localhost:6379"
# Senha do Redis (vazio = sem auth). Sobrescreva via REDIS_PASSWORD.
password = ""
# Índice do banco lógico do Redis. Sobrescreva via REDIS_DB.
db = 0
# TTL das entradas de cache do caminho de leitura de métricas. Sobrescreva via REDIS_METRICS_TTL.
metrics_ttl = "5m"
