# =============================================================================
# GAH — docker compose (desenvolvimento)
# =============================================================================
# Dois modos de uso:
#
#   1) Dev com go run (RECOMENDADO) — sobe só o Postgres e roda a app no host:
#        docker compose -f deploy/docker-compose.yml up -d db
#        cd server && DATABASE_URL=postgres://gah:gah@localhost:5432/gah?sslmode=disable make run
#      (ou apenas `make run` se o seu config.toml já apontar p/ localhost:5432)
#
#   2) Stack completa em container — Postgres + servidor:
#        docker compose -f deploy/docker-compose.yml up --build
#
# O banco agora é TimescaleDB (extensão sobre Postgres 16) — necessário p/ as
# hypertables de telemetria (activities, metrics, daily_metric_aggregates).
#
# As migrations NÃO são mais aplicadas pelo docker-entrypoint-initdb.d. Elas são
# aplicadas pelo runner Go embutido (rastreadas em schema_migrations): a API e o
# worker rodam `Migrate` no boot, e há ainda `make migrate` / `cmd/migrate` p/
# rodar manualmente. Isso evita aplicação dupla e drift, e funciona em qualquer
# reinício (não só na primeira init do volume).
# =============================================================================

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: gah-db
    environment:
      POSTGRES_USER: gah
      POSTGRES_PASSWORD: gah
      POSTGRES_DB: gah
    ports:
      - "5432:5432" # exposto p/ o `go run` no host alcançar o banco
    volumes:
      - gah_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gah -d gah"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gah-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: gah
      RABBITMQ_DEFAULT_PASS: gah
    ports:
      - "5672:5672"   # AMQP — exposto p/ o `go run` no host alcançar o broker
      - "15672:15672" # UI de management (http://localhost:15672, gah/gah)
    volumes:
      - gah_rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gah-redis
    ports:
      - "6379:6379" # exposto p/ o `go run` no host alcançar o cache
    volumes:
      - gah_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: gah-server
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://gah:gah@db:5432/gah?sslmode=disable
      RABBITMQ_URL: amqp://gah:gah@rabbitmq:5672/
      REDIS_ADDR: redis:6379
      # Observabilidade (off por padrão). Ative com OBSERVABILITY_ENABLED=true e
      # suba o profile "observability" (datadog-agent).
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-datadog-agent:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      DD_ENV: ${DD_ENV:-dev}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../server
      dockerfile: Dockerfile
      target: build
    container_name: gah-worker
    # A imagem runtime só empacota o binário da API; para o worker compilamos e
    # rodamos a partir do estágio de build (Go puro, sem dependências de C).
    command: ["go", "run", "./cmd/worker"]
    working_dir: /src
    environment:
      DATABASE_URL: postgres://gah:gah@db:5432/gah?sslmode=disable
      RABBITMQ_URL: amqp://gah:gah@rabbitmq:5672/
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-datadog-agent:4317}
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      DD_ENV: ${DD_ENV:-dev}
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Datadog Agent — recebe traces/métricas via OTLP/gRPC (:4317) e coleta os
  # logs dos containers, encaminhando tudo para a Datadog.
  #
  # Fica num profile "observability" para NÃO subir por padrão. Para ativar:
  #   export DD_API_KEY=<sua-api-key>
  #   docker compose -f deploy/docker-compose.yml --profile observability up --build
  # e suba server/worker com OBSERVABILITY_ENABLED=true (ver abaixo).
  #
  # A porta 4317 é exposta no host para permitir exportar também a partir de um
  # `go run` rodando fora do compose.
  # ---------------------------------------------------------------------------
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: gah-datadog-agent
    profiles: ["observability"]
    environment:
      # Defina DD_API_KEY no ambiente antes de subir o profile observability.
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      # Receptor OTLP (gRPC + HTTP) para os serviços instrumentados.
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: "0.0.0.0:4317"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: "0.0.0.0:4318"
      # Coleta de logs de todos os containers (JSON estruturado vira log no DD).
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:gah-datadog-agent"
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro

volumes:
  gah_pgdata:
  gah_rabbitmqdata:
  gah_redisdata:
